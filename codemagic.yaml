workflows:

  # ─────────────────────────────────────────────
  #  TEST — Build debug Android (sans signing)
  #  Objectif : valider que le projet compile
  # ─────────────────────────────────────────────
  android-debug:
    name: Android Debug (no signing)
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: barber_app

      - name: Analyze
        script: flutter analyze --no-fatal-warnings --no-fatal-infos
        working_directory: barber_app

      - name: Build APK debug
        script: flutter build apk --debug
        working_directory: barber_app

    artifacts:
      - barber_app/build/app/outputs/flutter-apk/app-debug.apk


  # ─────────────────────────────────────────────
  #  ANDROID — Google Play (internal test track)
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_signing         # CM_KEYSTORE_BASE64, CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD
      vars:
        PACKAGE_NAME: "com.kreno.app"
        CM_KEY_ALIAS: kreno
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: barber_app

      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE_BASE64 | base64 --decode > $CM_BUILD_DIR/kreno-release.keystore
          cat >> "$CM_BUILD_DIR/barber_app/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/kreno-release.keystore
          EOF

      - name: Build APK release
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
        working_directory: barber_app

      - name: Build App Bundle
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
        working_directory: barber_app

    artifacts:
      - barber_app/build/app/outputs/flutter-apk/app-release.apk
      - barber_app/build/app/outputs/bundle/release/app-release.aab


  # ─────────────────────────────────────────────
  #  iOS — TestFlight
  # ─────────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kreno.app
      groups:
        - app_store_connect      # APP_STORE_CONNECT_KEY_IDENTIFIER
                                 # APP_STORE_CONNECT_ISSUER_ID
                                 # APP_STORE_CONNECT_PRIVATE_KEY

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: barber_app

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
        working_directory: barber_app

    artifacts:
      - barber_app/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Beta Testers
