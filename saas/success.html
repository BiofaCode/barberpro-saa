<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur Kreno !</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#6366f1">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px 0;
            overflow-x: hidden;
        }

        /* Background glow */
        body::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(34, 197, 94, 0.12) 0%, transparent 65%);
            pointer-events: none;
        }

        .success-container {
            text-align: center;
            max-width: 560px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(.16, 1, .3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.12);
            border: 2px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pop 0.5s cubic-bezier(.16, 1, .3, 1) 0.3s both;
        }

        @keyframes pop {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: #22c55e;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: #a1a1aa;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .salon-name {
            color: #e4e4e7;
            font-weight: 700;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 14px;
        }

        .info-row+.info-row {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .info-label {
            color: #71717a;
        }

        .info-value {
            color: #e4e4e7;
            font-weight: 600;
        }

        .info-value.green {
            color: #22c55e;
        }

        .steps {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .step {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 20px 14px;
            text-align: center;
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .step-text {
            font-size: 12px;
            color: #a1a1aa;
            line-height: 1.4;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: fall 3s ease-in forwards;
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 1;
                transform: rotate(0deg);
            }

            100% {
                top: 110%;
                opacity: 0;
                transform: rotate(720deg);
            }
        }

        @media (max-width: 600px) {
            .success-container {
                margin: 16px;
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .steps {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Confetti -->
    <div class="confetti" id="confetti"></div>

    <div class="success-container">
        <div class="success-icon">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1>Paiement confirmé !</h1>
        <p class="subtitle">
            Génial ! Votre salon <span class="salon-name" id="salonNameDisplay"></span> est tout prêt.
            <br>Vos accès personnels vous ont été envoyés par email.
        </p>

        <div class="info-card">
            <div class="info-row">
                <span class="info-label">Abonnement</span>
                <span class="info-value" id="planDisplay">Pro</span>
            </div>
            <div class="info-row">
                <span class="info-label">Essai gratuit</span>
                <span class="info-value green">14 jours restants</span>
            </div>
            <div class="info-row">
                <span class="info-label">Statut du compte</span>
                <span class="info-value green">✅ Actif</span>
            </div>
        </div>

        <div class="actions">
            <!-- BIG PROMINENT BUTTON TO PRO DASHBOARD -->
            <a href="/pro" class="btn btn-primary"
                style="width: 100%; justify-content: center; font-size: 18px; padding: 18px;">
                Accéder à mon Espace Pro →
            </a>
            <a href="/" class="btn btn-secondary" style="width: 100%; justify-content: center;">Retour au site
                vitrine</a>
        </div>
    </div>

    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const planNames = { starter: 'Starter — 39 CHF/mois', pro: 'Pro — 49 CHF/mois', premium: 'Premium — 89 CHF/mois' };
        const plan = params.get('plan') || 'pro';
        const salonName = params.get('salon') || 'Votre salon';

        document.getElementById('salonNameDisplay').textContent = decodeURIComponent(salonName);
        document.getElementById('planDisplay').textContent = planNames[plan] || plan;

        // Confetti animation
        const colors = ['#22c55e', '#6366f1', '#818cf8', '#a78bfa', '#f59e0b', '#ec4899'];
        const confettiContainer = document.getElementById('confetti');

        for (let i = 0; i < 50; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + '%';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDelay = Math.random() * 2 + 's';
            piece.style.animationDuration = (2 + Math.random() * 2) + 's';
            piece.style.width = (6 + Math.random() * 8) + 'px';
            piece.style.height = (6 + Math.random() * 8) + 'px';
            confettiContainer.appendChild(piece);
        }
    </script>
    <script src="/saas/js/cookie.js" defer></script>
</body>

</html>
