<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalonPro | Plateforme SaaS Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚙️%3C/text%3E%3C/svg%3E">
</head>

<body>
    <div class="app" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">⚙️</div>
                    <div class="logo-text">Salon<span>Pro</span></div>
                </div>
                <div class="logo-badge">Admin</div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="#" class="nav-item" data-page="salons" id="nav-salons">
                    <span class="nav-icon">🏪</span> Mes Clients
                </a>
                <a href="#" class="nav-item" data-page="revenue" id="nav-revenue">
                    <span class="nav-icon">💰</span> Revenus
                </a>
                <a href="#" class="nav-item" data-page="activity" id="nav-activity">
                    <span class="nav-icon">🔔</span> Activité
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">F</div>
                    <div>
                        <div class="user-name">Fabio</div>
                        <div class="user-role">Super Admin</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="topbar">
                <button class="hamburger" id="hamburger">☰</button>
                <div class="topbar-title" id="pageTitle">Dashboard Plateforme</div>
                <div class="topbar-actions"></div>
            </header>

            <div class="content">
                <!-- DASHBOARD -->
                <section class="page active" id="page-dashboard">
                    <div class="stats-row" id="statsRow"></div>
                    <div class="card" style="margin-top:20px">
                        <div class="card-header">
                            <h3>🏪 Derniers salons créés</h3>
                            <button class="btn btn-primary btn-sm" onclick="openCreateSalonModal()">+ Créer</button>
                        </div>
                        <div class="card-body" id="recentSalonsList">
                            <div class="empty-state">Chargement...</div>
                        </div>
                    </div>
                </section>

                <!-- MES CLIENTS (SALONS) -->
                <section class="page" id="page-salons">
                    <div class="page-header">
                        <h2>🏪 Mes Clients</h2>
                        <div style="display:flex;gap:8px">
                            <button class="btn btn-outline btn-sm" onclick="exportSalonsCSV()">📥 CSV</button>
                            <button class="btn btn-primary btn-sm" onclick="openCreateSalonModal()">+ Créer</button>
                        </div>
                    </div>
                    <div style="margin-bottom:16px">
                        <input type="text" id="salonSearch" class="form-input" placeholder="🔍 Rechercher par nom, slug, email..." style="width:100%;max-width:420px" oninput="filterSalons(this.value)">
                    </div>
                    <div class="salons-grid" id="salonsList"></div>
                </section>

                <!-- REVENUS -->
                <section class="page" id="page-revenue">
                    <div class="page-header"><h2>💰 Revenus & Abonnements</h2></div>
                    <div id="revenuePage"></div>
                </section>

                <!-- ACTIVITÉ -->
                <section class="page" id="page-activity">
                    <div class="page-header"><h2>🔔 Activité Récente</h2></div>
                    <div id="activityPage"></div>
                </section>
            </div>
        </main>

        <!-- Mobile bottom nav -->
        <nav class="admin-bottom-nav" id="adminBottomNav">
            <button class="admin-bnav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                <span>📊</span><span class="admin-bnav-label">Dashboard</span>
            </button>
            <button class="admin-bnav-item" data-page="salons" onclick="navigateTo('salons')">
                <span>🏪</span><span class="admin-bnav-label">Salons</span>
            </button>
            <button class="admin-bnav-item" data-page="revenue" onclick="navigateTo('revenue')">
                <span>💰</span><span class="admin-bnav-label">Revenus</span>
            </button>
            <button class="admin-bnav-item" data-page="activity" onclick="navigateTo('activity')">
                <span>🔔</span><span class="admin-bnav-label">Activité</span>
            </button>
        </nav>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginOverlay" style="z-index: 9999; display: flex;">
        <div class="modal" style="width: 400px; text-align: center;">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <div class="logo-icon">⚙️</div>
                <div class="logo-text" style="color:#2d3436;">Salon<span style="color:var(--primary)">Pro</span> Admin
                </div>
            </div>
            <p style="color:var(--text-sec); margin-bottom: 20px;">Connectez-vous pour accéder à la plateforme.</p>
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Mot de passe Administrateur</label>
                <input type="password" class="form-input form-input-full" id="adminPassword" placeholder="••••••••"
                    onkeypress="if(event.key==='Enter') loginAdmin()" />
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="loginAdmin()">Se
                Connecter</button>
            <div id="loginError" style="color: var(--error); font-size: 0.85rem; margin-top: 10px; display: none;">Mot
                de passe incorrect</div>
        </div>
    </div>

    <script src="/admin/js/admin.js"></script>
</body>

</html>
